<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #2c5282; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background-color: #f7fafc; padding: 30px; border: 1px solid #e2e8f0; border-radius: 0 0 8px 8px; }
        .button { display: inline-block; background-color: #2c5282; color: white !important; text-decoration: none; padding: 12px 30px; border-radius: 6px; margin: 20px 0; font-weight: bold; }
        .warning { background-color: #fef3cd; border: 1px solid #ffc107; padding: 10px; border-radius: 4px; margin-top: 20px; }
        .footer { text-align: center; color: #718096; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header"><h1>YPMG Lab Webapp</h1></div>
    <div class="content">
        <h2>Confirm Your Email Address</h2>
        <p>Thank you for registering. Click below to confirm your account:</p>
        <p style="text-align: center;"><a href="{{ confirm_url }}" class="button">Confirm My Account</a></p>
        <p>Or copy this link: <span style="word-break: break-all; font-size: 12px;">{{ confirm_url }}</span></p>
        <div class="warning"><strong>⏰ This link expires in {{ expiry_hours }} hour(s).</strong></div>
    </div>
    <div class="footer"><p>Yosemite Pathology & Precision Pathology Medical Group</p></div>
</body>
</html>
