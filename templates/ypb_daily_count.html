<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#17406a" />
    <meta name="description" content="YPB Daily Block Count Form - Check Out Department" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>YPB Daily Count - {{ app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Prevent pull-to-refresh on mobile */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }

      /* Ensure proper mobile sizing */
      html {
        font-size: 16px;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Prevent iOS zoom on input focus */
      input, select, textarea {
        font-size: 16px !important;
      }

      /* Loading indicator */
      #root:empty::before {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        margin: 100px auto;
        border: 3px solid #e0e0e0;
        border-top-color: #17406a;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="{{ url_for('static', filename=ypb_asset) }}"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Pass session data to React app if needed
      window.WORKFLOW_SESSION = {
        sessionId: '{{ session.workflow_session_id }}',
        department: '{{ user_session.department }}',
        userId: '{{ current_user.id }}',
        csrfToken: '{{ csrf_token() }}'
      };
    </script>
  </body>
</html>
